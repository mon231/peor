name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build test suite (x86)
        working-directory: tests
        run: msbuild tests.sln /p:Configuration=Release /p:Platform=Win32 /nologo /verbosity:minimal

      - name: Build test suite (x64)
        working-directory: tests
        run: msbuild tests.sln /p:Configuration=Release /p:Platform=x64 /nologo /verbosity:minimal

      - name: Run pytest
        run: pytest tests/pytest/ -v
