name: Test

on:
  push:
    branches: ["**"]

env:
  PYTHON_VERSION: "3.11"

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# build-windows: compile all test PEs with MSBuild, upload binaries as artifact
# ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-timeout

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache Release test binaries
        id: cache-bins-release
        uses: actions/cache@v4
        with:
          path: |
            tests/Win_x86
            tests/Win_x64
          key: test-bins-release-${{ runner.os }}-${{ hashFiles('tests/**/*.cpp', 'tests/**/*.c', 'tests/**/*.vcxproj', 'tests/tests.sln') }}

      - name: Build test suite Release (Win32)
        if: steps.cache-bins-release.outputs.cache-hit != 'true'
        working-directory: tests
        run: msbuild tests.sln /p:Configuration=Release /p:Platform=Win32 /m /nologo /verbosity:minimal

      - name: Build test suite Release (x64)
        if: steps.cache-bins-release.outputs.cache-hit != 'true'
        working-directory: tests
        run: msbuild tests.sln /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal

      - name: Upload Release test binaries
        uses: actions/upload-artifact@v4
        with:
          name: test-bins-windows-release
          path: |
            tests/Win_x86
            tests/Win_x64
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# build-windows-debug: compile all test PEs in Debug mode
# ─────────────────────────────────────────────────────────────────────────────
  build-windows-debug:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache Debug test binaries
        id: cache-bins-debug
        uses: actions/cache@v4
        with:
          path: |
            tests/Win_x86
            tests/Win_x64
          key: test-bins-debug-${{ runner.os }}-${{ hashFiles('tests/**/*.cpp', 'tests/**/*.c', 'tests/**/*.vcxproj', 'tests/tests.sln') }}

      - name: Build test suite Debug (Win32)
        if: steps.cache-bins-debug.outputs.cache-hit != 'true'
        working-directory: tests
        run: msbuild tests.sln /p:Configuration=Debug /p:Platform=Win32 /m /nologo /verbosity:minimal

      - name: Build test suite Debug (x64)
        if: steps.cache-bins-debug.outputs.cache-hit != 'true'
        working-directory: tests
        run: msbuild tests.sln /p:Configuration=Debug /p:Platform=x64 /m /nologo /verbosity:minimal

      - name: Upload Debug test binaries
        uses: actions/upload-artifact@v4
        with:
          name: test-bins-windows-debug
          path: |
            tests/Win_x86
            tests/Win_x64
          retention-days: 1

  test-windows:
    runs-on: windows-latest
    needs: build-windows

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-timeout

      - name: Download Release test binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins-windows-release
          path: tests

      - name: Add VS-bundled clang-cl to PATH
        shell: pwsh
        run: |
          $clangDir = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "clang-cl.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty DirectoryName
          if ($clangDir) {
            echo "Found clang-cl at $clangDir"
            echo $clangDir | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          } else {
            echo "clang-cl not found in VS install; test_clangcl will skip"
          }

      # test_17_mingw_cpp_exceptions needs a native mingw-w64 g++ (both archs) on this
      # Windows runner: the exe it builds must run here, and windows-latest has no WSL.
      - name: Set up MSYS2 MinGW-w64 (x86_64 + i686) for test_17
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-i686-gcc

      - name: Expose mingw32 gcc/g++-posix aliases on PATH
        shell: msys2 {0}
        run: |
          cp /mingw64/bin/gcc.exe /mingw64/bin/x86_64-w64-mingw32-gcc.exe
          cp /mingw32/bin/gcc.exe /mingw32/bin/i686-w64-mingw32-gcc.exe
          cp /mingw64/bin/g++.exe /mingw64/bin/x86_64-w64-mingw32-g++-posix.exe
          cp /mingw32/bin/g++.exe /mingw32/bin/i686-w64-mingw32-g++-posix.exe
          echo "$(cygpath -w /mingw64/bin)" >> "$GITHUB_PATH"
          echo "$(cygpath -w /mingw32/bin)" >> "$GITHUB_PATH"

      - name: Build prebuilt test artifacts (build_tests.py)
        run: python tests/build_tests.py --target windows

      - name: Run pytest (Windows Release)
        run: pytest tests/pytest/ -v --cov=peor --cov-report=xml --cov-report=term-missing --timeout=60 -k "not linux and not efi"

# ─────────────────────────────────────────────────────────────────────────────
# test-windows-debug: run shellcode tests against Debug-mode PE binaries
# ─────────────────────────────────────────────────────────────────────────────
  test-windows-debug:
    runs-on: windows-latest
    needs: build-windows-debug

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-timeout

      - name: Download Debug test binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins-windows-debug
          path: tests

      - name: Set up MSYS2 MinGW-w64 (x86_64 + i686) for test_17
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-i686-gcc

      - name: Expose mingw32 gcc/g++-posix aliases on PATH
        shell: msys2 {0}
        run: |
          cp /mingw64/bin/gcc.exe /mingw64/bin/x86_64-w64-mingw32-gcc.exe
          cp /mingw32/bin/gcc.exe /mingw32/bin/i686-w64-mingw32-gcc.exe
          cp /mingw64/bin/g++.exe /mingw64/bin/x86_64-w64-mingw32-g++-posix.exe
          cp /mingw32/bin/g++.exe /mingw32/bin/i686-w64-mingw32-g++-posix.exe
          echo "$(cygpath -w /mingw64/bin)" >> "$GITHUB_PATH"
          echo "$(cygpath -w /mingw32/bin)" >> "$GITHUB_PATH"

      - name: Build prebuilt test artifacts (build_tests.py)
        run: python tests/build_tests.py --target windows

      - name: Run pytest (Windows Debug)
        run: pytest tests/pytest/ -v --timeout=60 -k "not linux and not efi"

# ─────────────────────────────────────────────────────────────────────────────
# build-linux-mingw: cross-compile all Linux PE tests and build the test loaders
# ─────────────────────────────────────────────────────────────────────────────
  build-linux-mingw:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-mingw-${{ runner.os }}-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: apt-mingw-${{ runner.os }}-

      - name: Install MinGW cross-compilers and GCC (x64 + x86)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64 \
            gcc-mingw-w64-i686  binutils-mingw-w64-i686 \
            g++-mingw-w64-x86-64 g++-mingw-w64-i686 \
            gcc gcc-multilib

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-timeout

      - name: Build Linux test loaders + prebuilt Linux test PEs (build_tests.py)
        run: python3 tests/build_tests.py --target linux

      - name: Cross-compile remaining Linux PE tests (x64 + x86)
        run: pytest tests/pytest -v --timeout=120 -k "linux"

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-bins-linux
          path: |
            tests/Linux_x64
            tests/Linux_x86
            tests/test_loader_linux
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# test-linux-mingw: run Linux shellcode tests against pre-built PEs (no MinGW)
# ─────────────────────────────────────────────────────────────────────────────
  test-linux-mingw:
    runs-on: ubuntu-latest
    needs: build-linux-mingw

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-bins-linux
          path: tests

      - name: Mark test loaders executable
        run: chmod +x tests/test_loader_linux/test_loader_linux.pe tests/test_loader_linux/test_loader_linux_32.pe

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-timeout

      - name: Run Linux shellcode tests (x64 + x86)
        run: pytest tests/pytest -v --timeout=60 -k "linux"

  test-efi-qemu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-efi-${{ runner.os }}-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: apt-efi-${{ runner.os }}-

      - name: Install MinGW (x64 + x86), QEMU, OVMF, and ARM64 tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64 \
            gcc-mingw-w64-i686   binutils-mingw-w64-i686 \
            g++-mingw-w64-x86-64 g++-mingw-w64-i686 \
            qemu-system-x86 ovmf ovmf-ia32 \
            clang lld \
            qemu-system-arm qemu-efi-aarch64 qemu-efi-arm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-timeout

      - name: Build prebuilt EFI test-source PEs (build_tests.py)
        run: python3 tests/build_tests.py --target efi

      - name: Run EFI shellcode tests (x64 + x86 + ARM64 QEMU)
        run: pytest tests/pytest -v --timeout=360 -k "efi"

# ─────────────────────────────────────────────────────────────────────────────
# test-summary: single required gate — fails unless every job above PASSED.
# No test in this workflow is allowed to silently skip (missing binaries/toolchains
# are hard failures, see PLAN.md), so "success" is the only acceptable result here.
# ─────────────────────────────────────────────────────────────────────────────
  test-summary:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build-windows
      - build-windows-debug
      - test-windows
      - test-windows-debug
      - build-linux-mingw
      - test-linux-mingw
      - test-efi-qemu
    steps:
      - name: Verify every job passed
        run: |
          echo '${{ toJSON(needs) }}' > needs.json
          python3 - <<'EOF'
          import json
          needs = json.load(open("needs.json"))
          failed = [name for name, info in needs.items() if info["result"] != "success"]
          for name, info in needs.items():
              print(f"{name}: {info['result']}")
          if failed:
              print(f"\nFAILED jobs (must all be 'success'): {', '.join(failed)}")
              raise SystemExit(1)
          print("\nAll jobs passed.")
          EOF
